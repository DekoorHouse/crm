<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checador Pro | Registro de Asistencia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">CHECADOR PRO</div>
            
            <div id="network-status" class="status-badge status-offline">
                <span class="dot">•</span>
                <span id="network-text">Verificando red...</span>
            </div>

            <div class="clock-container">
                <div id="time">00:00:00</div>
                <div id="date">Cargando fecha...</div>
            </div>

            <div class="input-group">
                <label for="employee-id">ID de Empleado</label>
                <input type="text" id="employee-id" placeholder="Ingresa tu ID o Nombre" autocomplete="off">
            </div>

            <div class="button-grid">
                <button id="btn-in" class="btn btn-in">
                    <span>ENTRADA</span>
                </button>
                <button id="btn-out" class="btn btn-out">
                    <span>SALIDA</span>
                </button>
            </div>

            <div class="history">
                <div class="history-title">
                    <span>RECIENTES</span>
                    <span id="clear-history" style="cursor: pointer; font-size: 0.7rem;">LIMPIAR</span>
                </div>
                <ul id="history-list" class="history-list">
                    <!-- Registros aparecerán aquí -->
                </ul>
            </div>
        </div>
    </div>

    <div id="notification" class="notification">
        Registro exitoso
    </div>

    <!-- Simulación de Red: Este modal aparecería si no está en la red correcta -->
    <div id="network-blocked" class="network-overlay">
        <div class="network-modal">
            <h2 style="color: #ef4444; margin-bottom: 15px;">Acceso Restringido</h2>
            <p style="color: #94a3b8; margin-bottom: 20px;">Para marcar asistencia, debes estar conectado a la red Wi-Fi de la oficina.</p>
            <button onclick="checkNetwork()" style="padding: 10px 20px; border-radius: 8px; border: none; background: #4f46e5; color: white; cursor: pointer;">Reintentar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
