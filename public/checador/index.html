<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checador Pro | Registro de Asistencia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Vista de Login -->
    <div id="login-view" style="position: fixed; inset: 0; z-index: 9999; background: var(--bg-dark); display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="card" style="max-width: 400px; width: 100%;">
            <div class="logo">
                <img src="logo.png" alt="Dekoor House Logo">
            </div>
            <h2 style="margin-bottom: 25px; color: var(--primary); font-size: 1.4rem;">Checador Pro</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="login-email">Correo Electrónico</label>
                    <input type="email" id="login-email" required placeholder="tu.correo@ejemplo.com">
                </div>
                <div class="input-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <div id="login-error" style="color: var(--danger); font-size: 0.85rem; margin-bottom: 15px; min-height: 1.2em; text-align: left;"></div>
                <button type="submit" id="login-submit-btn" class="btn btn-in" style="width: 100%; padding: 15px; font-size: 1rem;">Ingresar</button>
            </form>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="logo">
                <img src="logo.png" alt="Dekoor House Logo">
            </div>

            <div id="network-status" class="status-badge status-offline">
                <span class="dot">•</span>
                <span id="network-text">Verificando red...</span>
            </div>

            <div class="clock-container">
                <div id="time">00:00:00</div>
                <div id="date">Cargando fecha...</div>
            </div>

            <div class="input-group">
                <label for="employee-id">Nombre del Empleado</label>
                <input type="text" id="employee-id" placeholder="Ingresa tu nombre" autocomplete="off">
            </div>

            <div class="button-grid">
                <button id="btn-in" class="btn btn-in">
                    <span>ENTRADA</span>
                </button>
                <button id="btn-out" class="btn btn-out">
                    <span>SALIDA</span>
                </button>
            </div>

            <div class="history">
                <div class="history-title">
                    <span>RECIENTES</span>
                    <span id="clear-history" style="cursor: pointer; font-size: 0.7rem;">LIMPIAR</span>
                </div>
                <ul id="history-list" class="history-list"></ul>
            </div>

            <div class="admin-access" style="display: flex; justify-content: center; gap: 20px;">
                <a href="/checador/panel" class="link-btn">Panel Administrativo</a>
                <button id="logout-btn" class="link-btn" style="color: var(--danger);">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <div id="notification" class="notification">Registro exitoso</div>

    <div id="network-blocked" style="display:none;"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="app.js"></script>
</body>
</html>
