<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300" stroke="#D4722C" stroke-opacity="0.15" fill="none">
  <defs>
    <g id="elephant">
      <!-- Elefante simplificado: cabeza + cuerpo + trompa + oreja -->
      <path d="M 0 -8 C -6 -8 -11 -4 -11 2 C -11 6 -9 9 -6 10 L -6 14 L -3 14 L -3 10 L 3 10 L 3 14 L 6 14 L 6 10 C 9 9 11 6 11 2 C 11 -4 6 -8 0 -8 Z M -5 -1 A 1.2 1.2 0 0 1 -5 -1.01 M 10 4 C 13 3 15 0 15 -3 C 15 -5 13 -6 11 -5" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="gift">
      <!-- Caja de regalo con moño -->
      <rect x="-8" y="-4" width="16" height="12" fill="none" stroke-width="1.5" rx="1"/>
      <path d="M -8 0 L 8 0 M 0 -4 L 0 8" fill="none" stroke-width="1.5"/>
      <path d="M 0 -4 C -4 -7 -6 -4 -4 -2 M 0 -4 C 4 -7 6 -4 4 -2" fill="none" stroke-width="1.5"/>
    </g>
    <g id="lamp">
      <!-- Lampara 3D: base + pantalla -->
      <path d="M -6 -8 L 6 -8 L 5 0 L -5 0 Z" fill="none" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M -3 0 L -3 6 L 3 6 L 3 0" fill="none" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M -5 6 L 5 6" fill="none" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <g id="truck">
      <!-- Camion de envio -->
      <rect x="-10" y="-5" width="12" height="8" fill="none" stroke-width="1.5" rx="0.5"/>
      <path d="M 2 -2 L 8 -2 L 10 1 L 10 3 L 2 3 Z" fill="none" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="-5" cy="5" r="2" fill="none" stroke-width="1.5"/>
      <circle cx="6" cy="5" r="2" fill="none" stroke-width="1.5"/>
    </g>
    <g id="heart">
      <!-- Corazon -->
      <path d="M 0 7 C -8 1 -8 -5 -4 -7 C -1 -8 0 -5 0 -3 C 0 -5 1 -8 4 -7 C 8 -5 8 1 0 7 Z" fill="none" stroke-width="1.5" stroke-linejoin="round"/>
    </g>
    <g id="star">
      <!-- Estrella -->
      <path d="M 0 -8 L 2.4 -2.5 L 8 -1.5 L 4 2.5 L 5 8 L 0 5.2 L -5 8 L -4 2.5 L -8 -1.5 L -2.4 -2.5 Z" fill="none" stroke-width="1.5" stroke-linejoin="round"/>
    </g>
    <g id="camera">
      <!-- Camara -->
      <rect x="-9" y="-4" width="18" height="12" fill="none" stroke-width="1.5" rx="1.5"/>
      <circle cx="0" cy="2" r="3.5" fill="none" stroke-width="1.5"/>
      <path d="M -5 -4 L -4 -7 L 4 -7 L 5 -4" fill="none" stroke-width="1.5" stroke-linejoin="round"/>
    </g>
    <g id="chat">
      <!-- Burbuja de chat -->
      <path d="M -8 -5 L 8 -5 C 9 -5 9 -4 9 -4 L 9 3 C 9 4 8 5 7 5 L -2 5 L -6 8 L -6 5 L -7 5 C -8 5 -9 4 -9 3 L -9 -4 C -9 -4 -9 -5 -8 -5 Z" fill="none" stroke-width="1.5" stroke-linejoin="round"/>
    </g>
    <g id="sparkle">
      <!-- Destello/chispa -->
      <path d="M 0 -5 L 1 -1 L 5 0 L 1 1 L 0 5 L -1 1 L -5 0 L -1 -1 Z" fill="none" stroke-width="1.2" stroke-linejoin="round"/>
    </g>
    <g id="package">
      <!-- Caja/paquete -->
      <path d="M -7 -4 L 0 -7 L 7 -4 L 7 4 L 0 7 L -7 4 Z" fill="none" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M -7 -4 L 0 -1 L 7 -4 M 0 -1 L 0 7" fill="none" stroke-width="1.5"/>
    </g>
  </defs>

  <g class="pattern-group">
    <!-- Row 1 -->
    <use href="#elephant" transform="translate(40, 35)"/>
    <use href="#gift" transform="translate(110, 30)"/>
    <use href="#heart" transform="translate(185, 40)"/>
    <use href="#camera" transform="translate(255, 35)"/>

    <!-- Row 2 -->
    <use href="#star" transform="translate(20, 90)"/>
    <use href="#lamp" transform="translate(80, 95)"/>
    <use href="#truck" transform="translate(155, 90)"/>
    <use href="#sparkle" transform="translate(220, 100)"/>
    <use href="#chat" transform="translate(275, 95)"/>

    <!-- Row 3 -->
    <use href="#package" transform="translate(50, 155)"/>
    <use href="#heart" transform="translate(125, 150)"/>
    <use href="#elephant" transform="translate(200, 155)"/>
    <use href="#star" transform="translate(270, 160)"/>

    <!-- Row 4 -->
    <use href="#camera" transform="translate(25, 220)"/>
    <use href="#sparkle" transform="translate(85, 215)"/>
    <use href="#gift" transform="translate(145, 225)"/>
    <use href="#lamp" transform="translate(215, 220)"/>
    <use href="#chat" transform="translate(270, 230)"/>

    <!-- Row 5 (to blend tile edges) -->
    <use href="#truck" transform="translate(55, 280)"/>
    <use href="#heart" transform="translate(130, 285)"/>
    <use href="#package" transform="translate(200, 280)"/>
    <use href="#elephant" transform="translate(265, 285)"/>
  </g>
</svg>
