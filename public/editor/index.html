<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor - Dekoor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="header-left">
                <div class="brand">
                    <span class="brand-icon">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/>
                            <line x1="12" y1="22" x2="12" y2="15.5"/>
                            <polyline points="22 8.5 12 15.5 2 8.5"/>
                            <polyline points="2 15.5 12 8.5 22 15.5"/>
                            <line x1="12" y1="2" x2="12" y2="8.5"/>
                        </svg>
                    </span>
                    <span class="brand-name">Dekoor <span class="brand-sub">Editor</span></span>
                </div>
                <div class="header-divider"></div>
                <div class="menu-group">
                    <div class="menu-trigger" data-menu="file">Archivo</div>
                    <div class="menu-dropdown" id="menu-file">
                        <div class="menu-option" data-action="export-svg">
                            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 13l4 4 4-4M7 17V7"/><path d="M13 3h4v14h-4"/></svg>
                            Exportar SVG
                        </div>
                        <div class="menu-separator"></div>
                        <div class="menu-option" data-action="clear-all">
                            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 5h12M7 5V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1M9 8v6M11 8v6"/><path d="M5 5l1 11a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-11"/></svg>
                            Limpiar todo
                        </div>
                    </div>
                </div>
                <div class="menu-group">
                    <div class="menu-trigger" data-menu="page">P&aacute;gina</div>
                    <div class="menu-dropdown" id="menu-page">
                        <div class="menu-option" data-action="page-size">
                            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="14" height="14" rx="1"/><path d="M9 3v14M3 9h14"/></svg>
                            Tama&ntilde;o de p&aacute;gina...
                        </div>
                        <div class="menu-option" data-action="fit-page">
                            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7V4a1 1 0 0 1 1-1h3M13 3h3a1 1 0 0 1 1 1v3M17 13v3a1 1 0 0 1-1 1h-3M7 17H4a1 1 0 0 1-1-1v-3"/></svg>
                            Ajustar vista
                        </div>
                    </div>
                </div>
                <div class="menu-group">
                    <div class="menu-trigger" data-menu="edit">Editar</div>
                    <div class="menu-dropdown" id="menu-edit">
                        <div class="menu-option" data-action="group">
                            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="8" height="8" rx="1"/><rect x="11" y="11" width="8" height="8" rx="1"/><path d="M5 9v2a2 2 0 0 0 2 2h2M15 9V7a2 2 0 0 0-2-2h-2"/></svg>
                            Agrupar &nbsp;<span class="menu-shortcut">Ctrl+G</span>
                        </div>
                        <div class="menu-option" data-action="ungroup">
                            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="8" height="8" rx="1"/><rect x="11" y="11" width="8" height="8" rx="1"/></svg>
                            Desagrupar &nbsp;<span class="menu-shortcut">Ctrl+U</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <button id="theme-toggle" class="theme-btn" title="Cambiar tema">
                    <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
                </button>
                <div class="header-divider"></div>
                <div class="prop-group">
                    <label>Grosor</label>
                    <input type="number" id="stroke-width" value="2" min="0.5" max="50" step="0.5">
                </div>
                <div class="header-divider"></div>
                <div class="prop-group">
                    <label>Relleno</label>
                    <div class="color-swatch" id="fill-swatch" title="Color de relleno">
                        <div class="swatch-inner" style="background:#FFFFFF;"></div>
                    </div>
                </div>
                <div class="prop-group">
                    <label>L&iacute;nea</label>
                    <div class="color-swatch" id="stroke-swatch" title="Color de l&iacute;nea">
                        <div class="swatch-inner" style="background:#000000;"></div>
                    </div>
                </div>
                <div class="header-divider"></div>
                <div class="prop-group">
                    <label>Unidad</label>
                    <select id="unit-select" class="header-select">
                        <option value="px">px</option>
                        <option value="mm">mm</option>
                        <option value="cm">cm</option>
                        <option value="in">in</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Workspace -->
        <div id="workspace">
            <!-- Floating Toolbar -->
            <div id="toolbar">
                <button class="tool-btn active" data-tool="select" title="Seleccionar (V)">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M5 3v16l4.5-4.5 3 7 2.5-1-3-7H18z" fill="currentColor"/></svg>
                </button>
                <button class="tool-btn" data-tool="rect" title="Rect&aacute;ngulo (R)">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="16" height="16" rx="1"/></svg>
                </button>
                <button class="tool-btn" data-tool="ellipse" title="Elipse (E)">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"><ellipse cx="12" cy="12" rx="9" ry="7"/></svg>
                </button>
                <button class="tool-btn" data-tool="line" title="L&iacute;nea (L)">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/><circle cx="5" cy="19" r="1.5" fill="currentColor" stroke="none"/><circle cx="19" cy="5" r="1.5" fill="currentColor" stroke="none"/></svg>
                </button>
                <button class="tool-btn" data-tool="bspline" title="B-Spline (B)">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 18C8 2 16 22 20 6"/></svg>
                </button>
            </div>

            <!-- Properties Panel -->
            <div id="props-panel" class="hidden">
                <div class="props-title">Propiedades</div>
                <div class="props-row">
                    <div class="props-field">
                        <label>X</label>
                        <input type="number" id="prop-x" step="any">
                    </div>
                    <div class="props-field">
                        <label>Y</label>
                        <input type="number" id="prop-y" step="any">
                    </div>
                </div>
                <div class="props-sep"></div>
                <div class="props-row props-size-row">
                    <div class="props-field">
                        <label>An</label>
                        <input type="number" id="prop-w" step="any" min="0.1">
                    </div>
                    <button id="lock-aspect" class="lock-btn active" title="Bloquear proporci&oacute;n">
                        <svg class="icon-locked" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <svg class="icon-unlocked" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
                    </button>
                    <div class="props-field">
                        <label>Al</label>
                        <input type="number" id="prop-h" step="any" min="0.1">
                    </div>
                </div>
                <div class="props-sep"></div>
                <div class="props-row">
                    <div class="props-field">
                        <label>Rot&deg;</label>
                        <input type="number" id="prop-rotation" step="1" value="0">
                    </div>
                </div>
                <div class="props-unit" id="props-unit-label">px</div>
            </div>

            <!-- SVG Canvas -->
            <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="page-shadow-filter" x="-5%" y="-5%" width="115%" height="115%">
                        <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#3d2e5c" flood-opacity="0.10"/>
                        <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#3d2e5c" flood-opacity="0.06"/>
                    </filter>
                </defs>
                <rect id="page" fill="#f7f7f5" filter="url(#page-shadow-filter)" rx="2"/>
                <g id="objects-layer"></g>
                <g id="selection-layer"></g>
                <g id="snap-layer"></g>
                <g id="preview-layer"></g>
            </svg>
        </div>

        <!-- Color Palette -->
        <div id="color-palette">
            <div class="palette-special">
                <div class="palette-color no-color" data-color="none" title="Sin color">
                    <svg viewBox="0 0 14 14" width="10" height="10"><line x1="2" y1="2" x2="12" y2="12" stroke="#c44" stroke-width="2" stroke-linecap="round"/></svg>
                </div>
            </div>
            <div class="palette-divider"></div>
            <div id="palette-colors"></div>
        </div>

        <!-- Status Bar -->
        <div id="statusbar">
            <span id="status-tool">Seleccionar</span>
            <span class="status-dot"></span>
            <span id="status-page"></span>
            <span class="status-dot"></span>
            <span id="status-zoom">100%</span>
            <span class="status-spacer"></span>
            <span id="status-coords">X: 0  Y: 0</span>
        </div>
    </div>

    <!-- PowerClip Floating Menu -->
    <div id="powerclip-menu" class="powerclip-menu hidden">
        <button class="pc-btn" data-pc="edit" title="Editar contenido">
            <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 4l5 5-9 9H2v-5z"/></svg>
            Editar
        </button>
        <button class="pc-btn" data-pc="extract" title="Sacar contenido">
            <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3v10M6 9l4-4 4 4"/><path d="M3 13v3a1 1 0 001 1h12a1 1 0 001-1v-3"/></svg>
            Sacar
        </button>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="context-menu hidden">
        <div class="ctx-option" data-ctx="make-powerclip">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="16" height="16" rx="2"/><rect x="5" y="5" width="10" height="10" rx="1" stroke-dasharray="2 1"/></svg>
            Crear PowerClip
        </div>
        <div class="ctx-option" data-ctx="add-to-powerclip">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="16" height="16" rx="2"/><path d="M10 6v8M6 10h8"/></svg>
            Meter en PowerClip...
        </div>
        <div class="ctx-separator"></div>
        <div class="ctx-option" data-ctx="delete">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 5h12M7 5V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1M9 8v6M11 8v6"/><path d="M5 5l1 11a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-11"/></svg>
            Eliminar
        </div>
    </div>

    <!-- Page Size Modal -->
    <div id="page-size-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Tama&ntilde;o de p&aacute;gina</h3>
                <button class="modal-close" data-action="cancel">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Preset</label>
                    <select id="page-preset">
                        <option value="custom">Personalizado</option>
                        <option value="a4-portrait">A4 Vertical (210 &times; 297 mm)</option>
                        <option value="a4-landscape">A4 Horizontal (297 &times; 210 mm)</option>
                        <option value="a3-portrait">A3 Vertical (297 &times; 420 mm)</option>
                        <option value="a3-landscape">A3 Horizontal (420 &times; 297 mm)</option>
                        <option value="letter-portrait">Carta Vertical (216 &times; 279 mm)</option>
                        <option value="letter-landscape">Carta Horizontal (279 &times; 216 mm)</option>
                        <option value="1920x1080">Full HD (1920 &times; 1080)</option>
                        <option value="1080x1080">Instagram (1080 &times; 1080)</option>
                        <option value="800x600">800 &times; 600</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Unidad</label>
                    <select id="page-unit-select">
                        <option value="px">px</option>
                        <option value="mm">mm</option>
                        <option value="cm">cm</option>
                        <option value="in">in</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label id="page-width-label">Ancho (px)</label>
                        <input type="number" id="page-width-input" value="800" min="1" step="any">
                    </div>
                    <div class="form-group">
                        <label id="page-height-label">Alto (px)</label>
                        <input type="number" id="page-height-input" value="600" min="1" step="any">
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" data-action="cancel">Cancelar</button>
                <button class="btn btn-primary" data-action="apply">Aplicar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
