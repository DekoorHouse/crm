<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Vectorial - DeKoor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Menu Bar -->
        <div id="menubar">
            <div class="menu-group">
                <div class="menu-trigger" data-menu="file">Archivo</div>
                <div class="menu-dropdown" id="menu-file">
                    <div class="menu-option" data-action="export-svg">Exportar SVG</div>
                    <div class="menu-separator"></div>
                    <div class="menu-option" data-action="clear-all">Limpiar todo</div>
                </div>
            </div>
            <div class="menu-group">
                <div class="menu-trigger" data-menu="page">P&aacute;gina</div>
                <div class="menu-dropdown" id="menu-page">
                    <div class="menu-option" data-action="page-size">Tama&ntilde;o de p&aacute;gina...</div>
                    <div class="menu-option" data-action="fit-page">Ajustar vista a p&aacute;gina</div>
                </div>
            </div>
        </div>

        <!-- Property Bar -->
        <div id="propertybar">
            <div class="prop-group">
                <label>Grosor:</label>
                <input type="number" id="stroke-width" value="2" min="0.5" max="50" step="0.5">
            </div>
            <div class="prop-separator"></div>
            <div class="prop-group">
                <label>Relleno:</label>
                <div class="color-swatch" id="fill-swatch" title="Color de relleno">
                    <div class="swatch-inner" style="background:#FFFFFF;"></div>
                </div>
            </div>
            <div class="prop-group">
                <label>L&iacute;nea:</label>
                <div class="color-swatch" id="stroke-swatch" title="Color de l&iacute;nea">
                    <div class="swatch-inner" style="background:#000000;"></div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div id="main-content">
            <!-- Toolbar -->
            <div id="toolbar">
                <button class="tool-btn active" data-tool="select" title="Seleccionar (V)">
                    <svg viewBox="0 0 24 24"><path d="M5 3v16l4.5-4.5 3 7 2.5-1-3-7H18z" fill="currentColor"/></svg>
                </button>
                <button class="tool-btn" data-tool="rect" title="Rect&aacute;ngulo (R)">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                </button>
                <button class="tool-btn" data-tool="ellipse" title="Elipse (E)">
                    <svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="9" ry="7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                </button>
                <button class="tool-btn" data-tool="line" title="L&iacute;nea (L)">
                    <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" stroke-width="2.5"/></svg>
                </button>
                <button class="tool-btn" data-tool="bspline" title="B-Spline (B)">
                    <svg viewBox="0 0 24 24"><path d="M4 18C8 2 16 22 20 6" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                </button>
            </div>

            <!-- Workspace -->
            <div id="workspace">
                <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <pattern id="grid-pattern" width="10" height="10" patternUnits="userSpaceOnUse">
                            <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#ddd" stroke-width="0.3"/>
                        </pattern>
                    </defs>
                    <rect id="page-shadow" fill="rgba(0,0,0,0.2)" rx="1"/>
                    <rect id="page" fill="#FFFFFF" stroke="#aaa" stroke-width="0.5"/>
                    <rect id="page-grid" fill="url(#grid-pattern)" pointer-events="none"/>
                    <g id="objects-layer"></g>
                    <g id="selection-layer"></g>
                    <g id="preview-layer"></g>
                </svg>
            </div>
        </div>

        <!-- Color Palette -->
        <div id="color-palette">
            <div class="palette-special">
                <div class="palette-color no-color" data-color="none" title="Sin color (X)">&#10005;</div>
            </div>
            <div id="palette-colors"></div>
        </div>

        <!-- Status Bar -->
        <div id="statusbar">
            <span id="status-tool">Herramienta: Seleccionar</span>
            <span id="status-page"></span>
            <span id="status-zoom">Zoom: 100%</span>
            <span id="status-coords">X: 0  Y: 0</span>
        </div>
    </div>

    <!-- Page Size Modal -->
    <div id="page-size-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <h3>Tama&ntilde;o de p&aacute;gina</h3>
            <div class="modal-body">
                <div class="form-group">
                    <label>Preset:</label>
                    <select id="page-preset">
                        <option value="custom">Personalizado</option>
                        <option value="a4-portrait">A4 Vertical (210 x 297 mm)</option>
                        <option value="a4-landscape">A4 Horizontal (297 x 210 mm)</option>
                        <option value="a3-portrait">A3 Vertical (297 x 420 mm)</option>
                        <option value="a3-landscape">A3 Horizontal (420 x 297 mm)</option>
                        <option value="letter-portrait">Carta Vertical (216 x 279 mm)</option>
                        <option value="letter-landscape">Carta Horizontal (279 x 216 mm)</option>
                        <option value="1920x1080">Full HD (1920 x 1080)</option>
                        <option value="1080x1080">Instagram (1080 x 1080)</option>
                        <option value="800x600">800 x 600</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Ancho (px):</label>
                        <input type="number" id="page-width-input" value="800" min="50" max="10000">
                    </div>
                    <div class="form-group">
                        <label>Alto (px):</label>
                        <input type="number" id="page-height-input" value="600" min="50" max="10000">
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" data-action="cancel">Cancelar</button>
                <button class="btn btn-primary" data-action="apply">Aplicar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
