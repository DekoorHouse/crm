    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/sitio/style.css">
    <style>
        .collection-hero {
            padding: calc(var(--nav-height, 80px) + 2rem) 0 2rem;
            text-align: center;
        }
        .collection-hero h1 {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 800;
            color: var(--teal);
            margin-bottom: 0.5rem;
        }
        .collection-hero p {
            color: var(--text-medium);
            font-size: 1.05rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .collection-hero .collection-badge {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 700;
            font-size: 0.8rem;
            padding: 6px 16px;
            border-radius: 100px;
            margin-bottom: 1rem;
            letter-spacing: 0.5px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            padding: 2rem 0 4rem;
        }

        .product-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: var(--transition);
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .product-card-img {
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            background: var(--cream-dark);
        }
        .product-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .product-card:hover .product-card-img img {
            transform: scale(1.05);
        }

        .product-card-body {
            padding: 1.25rem;
        }
        .product-card-name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-dark);
            margin-bottom: 0.25rem;
        }
        .product-card-desc {
            color: var(--text-medium);
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }
        .product-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .product-card-pricing {
            margin-bottom: 1rem;
        }
        .price-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }
        .price-original {
            font-size: 1rem;
            color: var(--text-medium);
            text-decoration: line-through;
            font-weight: 500;
        }
        .price-current {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--primary);
        }
        .price-current small {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-medium);
        }
        .price-shipping {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #10b981;
        }
        .product-card-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--primary);
            color: var(--white);
            padding: 10px 20px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .product-card-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .empty-products {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-medium);
            grid-column: 1 / -1;
        }
        .empty-products i {
            font-size: 3rem;
            color: var(--border);
            margin-bottom: 1rem;
        }
        .empty-products p {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--teal);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 1rem;
            transition: var(--transition);
        }
        .back-link:hover { color: var(--primary); }

        @media (max-width: 768px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        }
        .product-card-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .product-card-btn.secondary {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .product-card-btn.secondary:hover {
            background: var(--primary-light);
        }

        /* Checkout Modal */
        .checkout-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .checkout-overlay.active { display: flex; }
        .checkout-modal {
            background: var(--white);
            border-radius: var(--radius-lg);
            max-width: 440px;
            width: 100%;
            padding: 2rem;
            position: relative;
            box-shadow: var(--shadow-lg);
            max-height: 90vh;
            overflow-y: auto;
        }
        .checkout-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-medium);
            line-height: 1;
        }
        .checkout-modal h2 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--teal);
            margin-bottom: 0.25rem;
        }
        .checkout-modal .checkout-subtitle {
            color: var(--text-medium);
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
        }
        .checkout-product {
            display: flex;
            gap: 12px;
            background: var(--cream);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 1.25rem;
        }
        .checkout-product img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }
        .checkout-product-info {
            flex: 1;
        }
        .checkout-product-info .name {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-dark);
        }
        .checkout-product-info .price {
            font-weight: 800;
            color: var(--primary);
            font-size: 1.1rem;
        }
        .checkout-field {
            margin-bottom: 1rem;
        }
        .checkout-field label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-dark);
            margin-bottom: 4px;
        }
        .checkout-field input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .checkout-field input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .checkout-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .checkout-submit:hover { background: var(--primary-hover); }
        .checkout-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .checkout-methods {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        .checkout-methods span {
            font-size: 0.75rem;
            color: var(--text-medium);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        @media (max-width: 480px) {
            .products-grid { grid-template-columns: 1fr; max-width: 400px; margin: 0 auto; }
            .product-card-footer { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
            .product-card-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<!-- Shared Navbar -->
<nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
        <a href="/sitio/" class="nav-logo">
            <img src="/sitio/img/logo-dekoor.webp" alt="Dekoor" class="logo-full">
        </a>
        <div class="nav-links">
            <a href="/sitio/" class="nav-link">Inicio</a>
            <a href="/sitio/#colecciones" class="nav-link active">Colecciones</a>
            <a href="/sitio/#categorias" class="nav-link">Categorías</a>

        </div>
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menú">
            <i class="fas fa-bars"></i>
        </button>
    </div>
</nav>

<div id="mobileMenu" class="mobile-menu hidden">
    <div class="mobile-menu-overlay"></div>
    <div class="mobile-menu-panel">
        <button class="mobile-menu-close">&times;</button>
        <a href="/sitio/" class="mobile-link"><i class="fas fa-home"></i> Inicio</a>
        <a href="/sitio/#colecciones" class="mobile-link active"><i class="fas fa-layer-group"></i> Colecciones</a>
        <a href="/referencias/" class="mobile-link"><i class="fas fa-star"></i> Referencias</a>

<main>
    <div class="container">
        <div class="collection-hero">
            <a href="/sitio/#colecciones" class="back-link"><i class="fas fa-arrow-left"></i> Todas las colecciones</a>
            <div class="collection-badge" id="collectionBadge">COLECCIÓN</div>
            <h1 id="collectionTitle">Cargando...</h1>
            <p id="collectionDesc"></p>
        </div>

        <div class="products-grid" id="productsGrid">
            <div class="empty-products">
                <div class="spinner" style="margin:0 auto 1rem;width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
                <p>Cargando productos...</p>
            </div>
        </div>
    </div>
</main>

<!-- Checkout Modal -->
<div class="checkout-overlay" id="checkoutOverlay">
    <div class="checkout-modal">
        <button class="checkout-close" id="checkoutClose">&times;</button>
        <h2>Completa tu pedido</h2>
        <p class="checkout-subtitle">Llena tus datos y paga de forma segura</p>
        <div class="checkout-product" id="checkoutProduct"></div>
        <form id="checkoutForm">
            <div class="checkout-field">
                <label for="ckName">Nombre completo *</label>
                <input type="text" id="ckName" required placeholder="Tu nombre">
            </div>
            <div class="checkout-field">
                <label for="ckPhone">WhatsApp (10 digitos) *</label>
                <input type="tel" id="ckPhone" required placeholder="618 123 4567" maxlength="15">
            </div>
            <div class="checkout-field">
                <label for="ckEmail">Email (opcional)</label>
                <input type="email" id="ckEmail" placeholder="tu@email.com">
            </div>
            <button type="submit" class="checkout-submit" id="checkoutBtn">
                <i class="fas fa-lock"></i> Pagar $650 MXN
            </button>
        </form>
        <div class="checkout-methods">
            <span><i class="far fa-credit-card"></i> Tarjeta</span>
            <span><i class="fas fa-store"></i> OXXO</span>
            <span><i class="fas fa-university"></i> SPEI</span>
        </div>
    </div>
</div>

<!-- WhatsApp FAB -->
<a href="https://wa.me/5216181333519?text=Hola%20Dekoor" class="whatsapp-fab" target="_blank" rel="noopener" aria-label="WhatsApp">
    <i class="fab fa-whatsapp"></i>
</a>

<script src="/env-config.js"></script>
<script>
const WA = '5216181333519';
const API = window.API_BASE_URL || '';

const COLLECTIONS = {
    ninos: {
        title: 'Niños',
        desc: 'Lámparas 3D mágicas para los más pequeños del hogar. Personalizadas con su nombre y personaje favorito.',
        price: '$650', originalPrice: '$780',
        productName: 'Lámpara 3D',
        productDesc: 'Lámpara LED personalizada con grabado láser, base negra, control remoto con 16 colores.',
        folder: 'Ninos'
    },
    pareja: {
        title: 'Pareja',
        desc: 'Regalos románticos personalizados con tu foto y mensaje especial. El detalle perfecto para esa persona.',
        price: '$650', originalPrice: '$780',
        productName: 'Lámpara 3D',
        productDesc: 'Lámpara LED personalizada con foto de pareja, nombre y fecha especial. 16 colores con control remoto.',
        folder: 'Pareja'
    },
    empresas: {
        title: 'Empresas',
        desc: 'Reconocimientos, trofeos y regalos corporativos con el logo de tu empresa o equipo favorito.',
        price: '$650', originalPrice: '$780',
        productName: 'Lámpara 3D Corporativa',
        productDesc: 'Lámpara LED con logo o diseño personalizado. Ideal para reconocimientos, premios y merchandising.',
        folder: 'Empresas'
    },
    familia: {
        title: 'Familia',
        desc: 'Inmortaliza los mejores momentos familiares. Fotos de mascotas, hijos, abuelos y toda la familia.',
        price: '$650', originalPrice: '$780',
        productName: 'Lámpara 3D Familiar',
        productDesc: 'Lámpara LED con foto familiar, nombre de mascota o retrato grupal. 16 colores con control remoto.',
        folder: 'Familia'
    },
    memorial: {
        title: 'Memorial',
        desc: 'Un tributo luminoso para honrar la memoria de tus seres queridos. Un recuerdo que siempre brilla.',
        price: '$650', originalPrice: '$780',
        productName: 'Lámpara 3D Memorial',
        productDesc: 'Lámpara LED con foto y mensaje dedicado. Un homenaje luminoso que mantiene viva su memoria.',
        folder: 'Memorial'
    }
};

// Get collection from URL
const params = new URLSearchParams(window.location.search);
const colId = params.get('id') || 'ninos';
const col = COLLECTIONS[colId];

if (!col) {
    window.location.href = '/sitio/#colecciones';
}

// Set page info
document.title = `${col.title} | Dekoor`;
document.getElementById('collectionBadge').textContent = `COLECCIÓN ${col.title.toUpperCase()}`;
document.getElementById('collectionTitle').textContent = col.title;
document.getElementById('collectionDesc').textContent = col.desc;

// Fotos estáticas por colección
const PHOTOS = {
    ninos: ["05362bc1-cbd9-4544-9942-a8e4dca17e0f.webp","064355fb-6395-4117-b23b-37437d4df249.webp","476210b4-377e-4bfd-a2ca-5482a7d18e66.webp","844daad1-9e38-4c93-88d7-1d4ec7cb02e7.webp","b6fec1a0-b953-4766-80a4-5aefa79e9cc0.webp","ecf5f6d6-b1ac-4802-9dd7-63ecf62e9492.webp"],
    pareja: ["34b30e1c-d3e8-40d2-8630-d018fa69ac3b.webp","c10bc838-f275-4556-bf5f-9dba0748ebaa.webp"],
    empresas: ["e19f9060-fabc-467d-a1c7-f3e8df6f0a33.webp","unnamed (5).webp"],
    familia: ["460b38b0-4d38-4127-b508-bbb03e55660b.webp","559ea191-b2b9-41ce-8af3-cfde8c193065.webp","75626782-dc3b-4e3d-ba26-9bad0ad5e49d.webp"],
    memorial: ["9058f734-a4d3-4806-bef6-40e646a1617c.webp"]
};

function loadProducts() {
    const grid = document.getElementById('productsGrid');
    const photos = PHOTOS[colId] || [];

    if (!photos.length) {
        grid.innerHTML = `
            <div class="empty-products">
                <i class="fas fa-camera"></i>
                <p>Próximamente nuevos productos en esta colección</p>
                <a href="https://wa.me/${WA}?text=Hola%20Dekoor%2C%20me%20interesa%20la%20colección%20${encodeURIComponent(col.title)}" target="_blank" rel="noopener" class="btn btn-primary">
                    <i class="fab fa-whatsapp"></i> Preguntar por esta colección
                </a>
            </div>`;
        return;
    }

    grid.innerHTML = photos.map(filename => {
        const url = `/sitio/img/col/${colId}/${encodeURIComponent(filename)}`;
        const waMsg = encodeURIComponent(`Hola Dekoor, me interesa este producto de la colección ${col.title}`);
        return `
            <div class="product-card">
                <div class="product-card-img">
                    <img src="${url}" alt="${col.productName} - ${col.title}" loading="lazy">
                </div>
                <div class="product-card-body">
                    <div class="product-card-name">${col.productName}</div>
                    <div class="product-card-desc">${col.productDesc}</div>
                    <div class="product-card-pricing">
                        <div class="price-row">
                            <span class="price-original">${col.originalPrice}</span>
                            <span class="price-current">${col.price} <small>MXN</small></span>
                        </div>
                        <div class="price-shipping"><i class="fas fa-truck"></i> Envío gratis</div>
                    </div>
                    <div class="product-card-buttons">
                        <button onclick="openCheckout('${url}', '${col.productName}')" class="product-card-btn" style="width:100%;justify-content:center;">
                            <i class="fas fa-credit-card"></i> Pagar en línea
                        </button>
                        <a href="https://wa.me/${WA}?text=${waMsg}" target="_blank" rel="noopener" class="product-card-btn secondary" style="width:100%;justify-content:center;">
                            <i class="fab fa-whatsapp"></i> Preguntar
                        </a>
                    </div>
                </div>
            </div>`;
    }).join('');
}

loadProducts();

// Checkout modal
let currentProductImg = '';
let currentProductName = '';

function openCheckout(imgUrl, productName) {
    currentProductImg = imgUrl;
    currentProductName = productName;
    document.getElementById('checkoutProduct').innerHTML = `
        <img src="${imgUrl}" alt="${productName}">
        <div class="checkout-product-info">
            <div class="name">${productName} - ${col.title}</div>
            <div class="price">$650 <small style="font-weight:400;color:var(--text-medium)">MXN</small></div>
        </div>`;
    document.getElementById('checkoutOverlay').classList.add('active');
}

document.getElementById('checkoutClose').addEventListener('click', () => {
    document.getElementById('checkoutOverlay').classList.remove('active');
});
document.getElementById('checkoutOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
});

document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('checkoutBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';

    try {
        const res = await fetch(API + '/api/conekta/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                customerName: document.getElementById('ckName').value.trim(),
                customerPhone: document.getElementById('ckPhone').value.trim(),
                customerEmail: document.getElementById('ckEmail').value.trim(),
                productName: currentProductName,
                collection: col.title,
                imageUrl: currentProductImg
            })
        });
        const data = await res.json();
        if (data.checkoutUrl) {
            window.location.href = data.checkoutUrl;
        } else {
            throw new Error(data.error || 'Error al crear el pago');
        }
    } catch (err) {
        alert('Error: ' + err.message + '\nPuedes intentar de nuevo o contactarnos por WhatsApp.');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-lock"></i> Pagar $650 MXN';
    }
});

// Mobile menu
var hamburgerBtn = document.getElementById('hamburgerBtn');
var mobileMenu = document.getElementById('mobileMenu');
hamburgerBtn.addEventListener('click', function() { mobileMenu.classList.toggle('hidden'); });
mobileMenu.querySelector('.mobile-menu-overlay').addEventListener('click', function() { mobileMenu.classList.add('hidden'); });
mobileMenu.querySelector('.mobile-menu-close').addEventListener('click', function() { mobileMenu.classList.add('hidden'); });
</script>
</body>
</html>
