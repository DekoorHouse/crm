<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sigue tu pedido · Dekoor</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root { --navy:#163C51; --orange:#F47B20; --green:#1B8E3C; --gray:#6B7280; }
  * { box-sizing:border-box; }
  html, body { margin:0; height:100%; }
  body { display:flex; flex-direction:column; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:#f4f6f8; }
  header { background:var(--navy); color:#fff; padding:16px 18px; text-align:center; transition:background .3s; }
  header h1 { margin:0; font-size:18px; }
  header p { margin:5px 0 0; font-size:14px; opacity:.92; }
  header.done { background:var(--green); }
  .estado { background:#fff; padding:14px 18px; text-align:center; border-bottom:1px solid #eee; }
  .faltan { font-size:26px; font-weight:800; color:var(--orange); line-height:1.1; }
  .faltan small { display:block; font-size:13px; color:var(--gray); font-weight:500; margin-top:3px; }
  .eta { font-size:14px; color:var(--gray); margin-top:8px; }
  #map { flex:1; min-height:300px; z-index:0; }
  .driver-marker { position:relative; width:46px; height:46px; }
  .driver-marker .badge { position:absolute; top:5px; left:5px; width:36px; height:36px; border-radius:50%; background:var(--orange); display:flex; align-items:center; justify-content:center; font-size:20px; border:2.5px solid #fff; box-shadow:0 2px 7px rgba(0,0,0,.45); }
  .driver-marker .pulse { position:absolute; top:5px; left:5px; width:36px; height:36px; border-radius:50%; background:var(--orange); animation:pulso 1.8s ease-out infinite; }
  @keyframes pulso { 0%{transform:scale(.7);opacity:.5} 100%{transform:scale(2);opacity:0} }
  .home-pin { width:38px; height:38px; border-radius:50%; background:var(--navy); border:2.5px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center; font-size:18px; }
  .leaflet-marker-icon.driver-anim { transition: transform 1.6s linear; }
</style>
</head>
<body>
  <header id="hd">
    <h1 id="titulo">🛵 Tu pedido está en camino</h1>
    <p id="sub">Sigue al repartidor en tiempo real</p>
  </header>
  <div class="estado">
    <div class="faltan" id="faltan">…<small>cargando</small></div>
    <div class="eta" id="eta"></div>
  </div>
  <div id="map"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const cfg = {
      apiKey: "AIzaSyBdLBxVl64KqifVUinLrtxjQnk2jrPT-yg",
      authDomain: "pedidos-con-gemini.firebaseapp.com",
      projectId: "pedidos-con-gemini",
      storageBucket: "pedidos-con-gemini.appspot.com",
      messagingSenderId: "300825194175",
      appId: "1:300825194175:web:972fa7b8af195a83e6e00a"
    };
    const db = getFirestore(initializeApp(cfg));

    const id = new URLSearchParams(location.search).get('id');

    const map = L.map('map').setView([24.0277, -104.6532], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      maxZoom: 20, detectRetina: true, subdomains: 'abcd',
      attribution: '© OpenStreetMap, © CARTO'
    }).addTo(map);
    const driverIcon = L.divIcon({ className: 'driver-anim', html: '<div class="driver-marker"><div class="pulse"></div><div class="badge">🛵</div></div>', iconSize: [46, 46], iconAnchor: [23, 23] });
    const homeIcon = L.divIcon({ className: '', html: '<div class="home-pin">🏠</div>', iconSize: [40, 40], iconAnchor: [20, 20] });
    let driverM = null, clientM = null, linea = null, fitted = false;

    const $ = (x) => document.getElementById(x);

    if (!id) {
      $('faltan').innerHTML = 'Link inválido';
    } else {
      onSnapshot(doc(db, 'seguimiento', id),
        (snap) => { if (!snap.exists()) { $('faltan').innerHTML = 'Pedido no encontrado<small>revisa tu link</small>'; return; } render(snap.data()); },
        () => { $('faltan').innerHTML = 'No disponible por ahora'; });
    }

    function render(d) {
      if (d.estado === 'ENTREGADO') {
        $('titulo').textContent = '✅ ¡Tu pedido fue entregado!';
        $('sub').textContent = 'Gracias por tu compra 🧡';
        $('hd').classList.add('done');
        $('faltan').innerHTML = 'Entregado';
        $('eta').textContent = '';
      } else if (d.estado === 'CANCELADO') {
        $('titulo').textContent = 'Pedido cancelado';
        $('sub').textContent = 'Cualquier duda, contáctanos';
        $('faltan').textContent = '—';
        $('eta').textContent = '';
      } else {
        const f = d.faltan || 0;
        $('faltan').innerHTML = (f === 0)
          ? '¡Eres el siguiente! 🎉<small>el repartidor va en camino a ti</small>'
          : f + '<small>entrega' + (f === 1 ? '' : 's') + ' antes de la tuya</small>';
        if (!d.driverLat) $('eta').textContent = 'Esperando la ubicación del repartidor…';
        else $('eta').textContent = (d.minutos > 0) ? ('🕒 Aprox. ' + d.minutos + ' min') : '';
      }

      const pts = [];
      if (d.clienteLat) {
        clientM = clientM ? clientM.setLatLng([d.clienteLat, d.clienteLng])
          : L.marker([d.clienteLat, d.clienteLng], { icon: homeIcon }).addTo(map);
        pts.push([d.clienteLat, d.clienteLng]);
      }
      if (d.driverLat) {
        driverM = driverM ? driverM.setLatLng([d.driverLat, d.driverLng])
          : L.marker([d.driverLat, d.driverLng], { icon: driverIcon, zIndexOffset: 1000 }).addTo(map);
        pts.push([d.driverLat, d.driverLng]);
      }
      // Línea que conecta al repartidor con tu casa
      if (d.clienteLat && d.driverLat) {
        const coords = [[d.driverLat, d.driverLng], [d.clienteLat, d.clienteLng]];
        if (linea) linea.setLatLngs(coords);
        else linea = L.polyline(coords, { color: '#163C51', weight: 3, opacity: 0.45, dashArray: '4 9' }).addTo(map);
      }
      if (pts.length && !fitted) {
        fitted = true;
        if (pts.length > 1) map.fitBounds(pts, { padding: [70, 70] });
        else map.setView(pts[0], 16);
      }
    }
  </script>
</body>
</html>
