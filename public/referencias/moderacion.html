<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderación de Referencias | Dekoor</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/referencias/style.css">
    <style>
        /* --- Tabs --- */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 2rem;
        }

        .tab-btn {
            background: var(--glass-background);
            border: 1px solid var(--glass-border);
            color: var(--text-gray);
            padding: 10px 24px;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: none;
        }

        .tab-btn.active {
            background: var(--accent-glow);
            color: var(--primary-color);
            border-color: rgba(255, 142, 65, 0.3);
        }

        .tab-count {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 100px;
            font-size: 0.75rem;
        }

        .tab-btn.active .tab-count {
            background: rgba(255, 142, 65, 0.3);
        }

        /* --- Card Actions --- */
        .ref-card-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--glass-border);
        }

        .btn-approve {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }

        .btn-approve:hover {
            background: rgba(34, 197, 94, 0.25);
            transform: none;
        }

        .btn-reject {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }

        .btn-reject:hover {
            background: rgba(239, 68, 68, 0.25);
            transform: none;
        }

        .ref-card-meta {
            font-size: 0.75rem;
            color: var(--text-gray);
            opacity: 0.6;
            margin-top: 8px;
        }

        .status-approved {
            color: #22c55e;
            font-weight: 600;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .empty-tab {
            text-align: center;
            padding: 40px;
            color: var(--text-gray);
            opacity: 0.6;
        }

        .empty-tab i {
            font-size: 2rem;
            margin-bottom: 12px;
            display: block;
        }

        /* Rotate buttons */
        .photo-wrapper {
            position: relative;
        }
        .ref-photos-grid .photo-wrapper {
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 4px;
        }
        .ref-photos-grid .photo-wrapper .ref-grid-photo {
            border-radius: 0;
        }
        .ref-photos-3 .photo-wrapper:first-child {
            grid-row: span 2;
        }
        .photo-wrapper:hover .rotate-btn {
            opacity: 1;
        }
        .rotate-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        .rotate-btn:hover {
            background: rgba(255,142,65,0.9);
        }
        .rotate-btn.rotating {
            opacity: 1;
            pointer-events: none;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            .ref-card-actions {
                flex-direction: column;
            }
            .btn-approve, .btn-reject {
                justify-content: center;
            }
        }

        /* --- Login Screen --- */
        .login-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg-color, #1a1a2e);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-overlay.hidden { display: none; }

        .login-box {
            background: var(--glass-background, rgba(255,255,255,0.05));
            border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .login-box .logo-img {
            width: 80px;
            margin-bottom: 20px;
        }
        .login-box h2 {
            margin: 0 0 8px;
            font-size: 1.4rem;
        }
        .login-box p {
            color: var(--text-gray, #999);
            font-size: 0.85rem;
            margin: 0 0 24px;
        }
        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
            background: rgba(255,255,255,0.05);
            color: var(--text-color, #fff);
            font-size: 0.9rem;
            margin-bottom: 12px;
            outline: none;
            box-sizing: border-box;
        }
        .login-box input:focus {
            border-color: var(--primary-color, #FF8E41);
        }
        .login-box .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: var(--primary-color, #FF8E41);
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 4px;
            transition: opacity 0.2s;
        }
        .login-box .btn-login:hover { opacity: 0.9; }
        .login-box .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
        .login-error {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 10px;
            min-height: 1.2em;
        }

        /* Hide main content until auth */
        .app-content { display: none; }
        .app-content.visible { display: block; }

        /* Loading state */
        .auth-loading {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: var(--bg-color, #1a1a2e);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-gray, #999);
            font-size: 0.9rem;
        }
        .auth-loading.hidden { display: none; }
    </style>
</head>
<body>

<div class="auth-loading" id="authLoading">
    <i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i> Verificando sesión...
</div>

<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <img src="/jt-rastreo/logo.png" alt="Dekoor" class="logo-img">
        <h2>Iniciar Sesión</h2>
        <p>Acceso restringido a moderadores</p>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <input type="email" id="loginEmail" placeholder="Correo electrónico" required autocomplete="email">
            <input type="password" id="loginPassword" placeholder="Contraseña" required autocomplete="current-password">
            <button type="submit" class="btn-login" id="loginBtn">Entrar</button>
        </form>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<div class="app-content" id="appContent">

<div class="bg-gradient"></div>

<div id="lightbox" class="lightbox hidden" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="Foto ampliada">
</div>

<div class="container">

    <header>
        <a href="/">
            <img src="/jt-rastreo/logo.png" alt="Dekoor" class="logo-img">
        </a>
    </header>

    <section class="hero">
        <h1>Moderación de Referencias</h1>
        <p>Aprueba o rechaza las referencias de clientes antes de publicarlas</p>
    </section>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('pendientes')">
            <i class="fas fa-clock"></i> Pendientes <span class="tab-count" id="countPendientes">0</span>
        </button>
        <button class="tab-btn" onclick="switchTab('aprobadas')">
            <i class="fas fa-check-circle"></i> Aprobadas <span class="tab-count" id="countAprobadas">0</span>
        </button>
    </div>

    <div id="refGrid" class="ref-grid"></div>

    <div id="refEmpty" class="empty-tab hidden">
        <i class="fas fa-inbox"></i>
        <p id="emptyMsg">No hay referencias pendientes</p>
    </div>

</div>

</div><!-- /app-content -->

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="/env-config.js"></script>

<script>
// --- Firebase Init ---
const firebaseConfig = {
    apiKey: "AIzaSyBdLBxVl64KqifVUinLrtxjQnk2jrPT-yg",
    authDomain: "pedidos-con-gemini.firebaseapp.com",
    projectId: "pedidos-con-gemini",
    storageBucket: "pedidos-con-gemini.firebasestorage.app",
    messagingSenderId: "300825194175",
    appId: "1:300825194175:web:972fa7b8af195a83e6e00a"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var auth = firebase.auth();

// --- Auth Gate ---
firebase.auth().onAuthStateChanged(function(user) {
    document.getElementById('authLoading').classList.add('hidden');
    if (user) {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('appContent').classList.add('visible');
        initApp();
    } else {
        document.getElementById('loginOverlay').classList.remove('hidden');
        document.getElementById('appContent').classList.remove('visible');
    }
});

function handleLogin(e) {
    e.preventDefault();
    var email = document.getElementById('loginEmail').value;
    var password = document.getElementById('loginPassword').value;
    var btn = document.getElementById('loginBtn');
    var errorEl = document.getElementById('loginError');
    errorEl.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Entrando...';

    firebase.auth().signInWithEmailAndPassword(email, password)
        .catch(function(err) {
            var msg = 'Error al iniciar sesión';
            if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
                msg = 'Correo o contraseña incorrectos';
            } else if (err.code === 'auth/too-many-requests') {
                msg = 'Demasiados intentos. Intenta más tarde.';
            }
            errorEl.textContent = msg;
        })
        .finally(function() {
            btn.disabled = false;
            btn.textContent = 'Entrar';
        });
}

// --- App Init (runs only after auth) ---
var appInitialized = false;
function initApp() {
    if (appInitialized) return;
    appInitialized = true;
    loadRefs();
}

var currentTab = 'pendientes';
var allRefs = [];

// --- Tabs ---
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(function(btn) { btn.classList.remove('active'); });
    event.currentTarget.classList.add('active');
    renderRefs();
}

// --- Cargar todas las referencias ---
function loadRefs() {
    db.collection('referencias')
        .orderBy('fecha', 'desc')
        .onSnapshot(function(snapshot) {
            allRefs = [];
            snapshot.forEach(function(doc) {
                var data = doc.data();
                data.id = doc.id;
                allRefs.push(data);
            });
            updateCounts();
            renderRefs();
        });
}

function updateCounts() {
    var pendientes = allRefs.filter(function(r) { return r.aprobado !== true; });
    var aprobadas = allRefs.filter(function(r) { return r.aprobado === true; });
    document.getElementById('countPendientes').textContent = pendientes.length;
    document.getElementById('countAprobadas').textContent = aprobadas.length;
}

function renderRefs() {
    var filtered;
    if (currentTab === 'pendientes') {
        filtered = allRefs.filter(function(r) { return r.aprobado !== true; });
    } else {
        filtered = allRefs.filter(function(r) { return r.aprobado === true; });
    }

    var grid = document.getElementById('refGrid');
    var empty = document.getElementById('refEmpty');

    if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        document.getElementById('emptyMsg').textContent =
            currentTab === 'pendientes' ? 'No hay referencias pendientes' : 'No hay referencias aprobadas';
        return;
    }
    empty.classList.add('hidden');

    var html = '';
    for (var i = 0; i < filtered.length; i++) {
        var ref = filtered[i];
        var fecha = ref.fecha ? ref.fecha.toDate() : new Date();
        var fechaStr = fecha.toLocaleDateString('es-MX', {
            year: 'numeric', month: 'long', day: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });

        var starsHtml = '';
        for (var s = 0; s < 5; s++) {
            starsHtml += '<i class="fas fa-star ' + (s < ref.rating ? '' : 'empty') + '"></i>';
        }

        var photoHtml = '';
        var refFotos = ref.fotos || (ref.foto ? [ref.foto] : []);
        if (refFotos.length === 1) {
            photoHtml = '<div class="photo-wrapper">' +
                '<img src="' + refFotos[0] + '" class="ref-card-photo" alt="Foto" onclick="openLightbox(\'' + refFotos[0] + '\')" loading="lazy">' +
                '<button class="rotate-btn" onclick="event.stopPropagation(); rotatePhoto(\'' + ref.id + '\', 0, this)" title="Rotar"><i class="fas fa-redo"></i></button>' +
                '</div>';
        } else if (refFotos.length > 1) {
            photoHtml = '<div class="ref-photos-grid ref-photos-' + Math.min(refFotos.length, 5) + '">';
            for (var f = 0; f < refFotos.length; f++) {
                photoHtml += '<div class="photo-wrapper">' +
                    '<img src="' + refFotos[f] + '" class="ref-grid-photo" alt="Foto" onclick="openLightbox(\'' + refFotos[f] + '\')" loading="lazy">' +
                    '<button class="rotate-btn" onclick="event.stopPropagation(); rotatePhoto(\'' + ref.id + '\', ' + f + ', this)" title="Rotar"><i class="fas fa-redo"></i></button>' +
                    '</div>';
            }
            photoHtml += '</div>';
        }

        var nombre = escapeHtml(ref.nombre);
        var ciudadHtml = ref.ciudad ? '<span class="ref-city"><i class="fas fa-map-marker-alt"></i> ' + escapeHtml(ref.ciudad) + '</span>' : '';

        var initial = ref.nombre ? ref.nombre.replace('@','')[0].toUpperCase() : '?';
        var fallbackSvg = "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="#FF8E41"/><text x="50" y="58" text-anchor="middle" font-size="40" fill="white" font-family="sans-serif">' + initial + '</text></svg>');

        var actionsHtml = '';
        if (currentTab === 'pendientes') {
            actionsHtml =
                '<div class="ref-card-actions">' +
                    '<button class="btn-approve" onclick="aprobar(\'' + ref.id + '\')">' +
                        '<i class="fas fa-check"></i> Aprobar' +
                    '</button>' +
                    '<button class="btn-reject" onclick="rechazar(\'' + ref.id + '\')">' +
                        '<i class="fas fa-trash"></i> Eliminar' +
                    '</button>' +
                '</div>';
        } else {
            actionsHtml =
                '<div class="ref-card-actions">' +
                    '<span class="status-approved"><i class="fas fa-check-circle"></i> Publicada</span>' +
                    '<button class="btn-reject" onclick="rechazar(\'' + ref.id + '\')" style="margin-left:auto;">' +
                        '<i class="fas fa-trash"></i> Eliminar' +
                    '</button>' +
                '</div>';
        }

        html += '<div class="ref-card">' +
            '<div class="ref-card-header">' +
                '<img src="' + fallbackSvg + '" alt="' + nombre + '" loading="lazy">' +
                '<div class="ref-author">' +
                    '<div class="ref-author-name">' + nombre + '</div>' +
                    '<div class="ref-date">' + fechaStr + (ciudadHtml ? ' &middot; ' + ciudadHtml : '') + '</div>' +
                '</div>' +
            '</div>' +
            '<div class="ref-card-stars">' + starsHtml + '</div>' +
            '<div class="ref-card-text">' + escapeHtml(ref.texto) + '</div>' +
            photoHtml +
            actionsHtml +
        '</div>';
    }
    grid.innerHTML = html;
}

// --- Acciones ---
function aprobar(id) {
    db.collection('referencias').doc(id).update({ aprobado: true })
        .then(function() { /* Firestore onSnapshot se encarga */ })
        .catch(function(err) { alert('Error: ' + err.message); });
}

function rechazar(id) {
    if (!confirm('¿Seguro que quieres eliminar esta referencia?')) return;
    db.collection('referencias').doc(id).delete()
        .catch(function(err) { alert('Error: ' + err.message); });
}

// --- Lightbox ---
function openLightbox(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.remove('hidden');
}
function closeLightbox() {
    document.getElementById('lightbox').classList.add('hidden');
    document.getElementById('lightboxImg').src = '';
}

// --- Rotar foto ---
async function rotatePhoto(refId, photoIndex, btn) {
    btn.classList.add('rotating');
    try {
        var resp = await fetch('/api/referencias/rotate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ refId: refId, photoIndex: photoIndex, direction: 'cw' })
        });
        var data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Error al rotar');
        // onSnapshot se encarga de re-renderizar
    } catch (err) {
        alert('Error al rotar: ' + err.message);
    } finally {
        btn.classList.remove('rotating');
    }
}

// --- Utilidades ---
function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>

</body>
</html>
