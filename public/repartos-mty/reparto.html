<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#1B4D5C" />
<title>Ruta de entregas | Dekoor</title>
<link rel="icon" type="image/png" href="/favicon.png" />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
  :root{ --teal:#1B4D5C; --cream:#FAF0E6; --gold:#C9A24B; --primary:#D4722C;
         --ok:#1B8E3C; --err:#c0392b; --muted:#7c8a91; --bg:#eef2f3; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:#1f2a2e;padding-bottom:40px;}
  header{background:var(--teal);color:#fff;padding:16px 18px;position:sticky;top:0;z-index:10;box-shadow:0 2px 10px rgba(0,0,0,.15);}
  header .top{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  header h1{font-size:17px;font-weight:700;}
  header .fecha{font-size:13px;opacity:.85;margin-top:2px;text-transform:capitalize;}
  .progress{margin-top:12px;background:rgba(255,255,255,.18);border-radius:20px;height:8px;overflow:hidden;}
  .progress > span{display:block;height:100%;background:var(--gold);width:0;transition:width .3s;}
  .progress-txt{font-size:12.5px;opacity:.9;margin-top:6px;}
  .wrap{max-width:680px;margin:0 auto;padding:16px;}
  .summary{display:flex;gap:10px;margin-bottom:14px;}
  .summary .pill{flex:1;background:#fff;border-radius:13px;padding:12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .summary .pill b{display:block;font-size:22px;color:var(--teal);}
  .summary .pill small{font-size:12px;color:var(--muted);}
  .card{background:#fff;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);border-left:5px solid var(--gold);}
  .card.done{border-left-color:var(--ok);opacity:.72;}
  .card .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .card .who{font-size:17px;font-weight:700;color:var(--teal);}
  .card .ped{font-size:12.5px;color:var(--muted);margin-top:1px;}
  .card .precio{background:#fff6ec;color:var(--primary);font-weight:800;font-size:16px;padding:5px 11px;border-radius:10px;white-space:nowrap;}
  .card .addr{margin:11px 0;font-size:15px;line-height:1.5;color:#33424a;}
  .card .addr .col{color:var(--teal);font-weight:600;}
  .card .meta{display:flex;flex-wrap:wrap;gap:8px;font-size:12.5px;color:var(--muted);margin-bottom:6px;}
  .card .meta span{background:#f1f5f6;padding:4px 9px;border-radius:8px;}
  .card .ref{font-size:13.5px;color:#5a6a70;font-style:italic;margin:8px 0 4px;}
  .card .comment{font-size:13.5px;color:var(--primary);background:#fff6ec;padding:8px 11px;border-radius:9px;margin:8px 0 4px;}
  .actions{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap;}
  .actions a, .actions button{flex:1;min-width:84px;border:none;border-radius:11px;padding:11px 8px;font-family:inherit;
       font-size:13.5px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;}
  .btn-map{background:#e8eef0;color:var(--teal);} .btn-wa{background:#25D366;color:#fff;}
  .btn-call{background:#e8eef0;color:var(--teal);}
  .btn-done{background:var(--ok);color:#fff;flex-basis:100%;}
  .btn-undone{background:#f1f5f6;color:var(--muted);flex-basis:100%;}
  .state{text-align:center;padding:60px 20px;color:var(--muted);}
  .state i{font-size:42px;margin-bottom:14px;color:var(--gold);}
  .state h2{color:var(--teal);font-size:19px;margin-bottom:6px;}
</style>
</head>
<body>
  <header>
    <div class="top">
      <div>
        <h1><i class="fas fa-truck-fast"></i> Ruta de entregas</h1>
        <div class="fecha" id="fecha"></div>
      </div>
      <img src="/sitio/img/logo-dekoor.webp" alt="Dekoor" style="height:34px;" />
    </div>
    <div class="progress"><span id="bar"></span></div>
    <div class="progress-txt" id="progressTxt"></div>
  </header>

  <div class="wrap">
    <div class="summary" id="summary" style="display:none;">
      <div class="pill"><b id="cTotal">0</b><small>Entregas</small></div>
      <div class="pill"><b id="cPend">0</b><small>Pendientes</small></div>
      <div class="pill"><b id="cCobro">$0</b><small>Por cobrar</small></div>
    </div>
    <div id="list"></div>
    <div class="state" id="state"><i class="fas fa-spinner fa-spin"></i><h2>Cargando ruta...</h2></div>
  </div>

<script src="/env-config.js"></script>
<script>
(function(){
  const API=window.API_BASE_URL||'';
  const params=new URLSearchParams(location.search);
  const token=params.get('token')||params.get('t')||'';
  const fecha=(location.pathname.match(/\/reparto\/([0-9]{4}-[0-9]{2}-[0-9]{2})/)||[])[1]||'';
  const $=id=>document.getElementById(id);
  const esc=s=>String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  let items=[];

  function fechaLarga(f){
    try{ const [y,mo,d]=f.split('-').map(Number);
      return new Date(y,mo-1,d).toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    }catch(e){ return f; }
  }
  function money(n){ return '$'+(Number(n)||0).toLocaleString('es-MX'); }
  function fullAddr(it){
    let s=it.calle||'';
    if(it.numExterior) s+=' '+it.numExterior;
    if(it.numInterior) s+=' Int. '+it.numInterior;
    return s;
  }
  function mapsUrl(it){
    const q=[fullAddr(it), it.colonia, it.cp, 'Monterrey, Nuevo León'].filter(Boolean).join(', ');
    return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q);
  }

  function render(){
    const total=items.length, done=items.filter(i=>i.entregado).length;
    const pend=total-done;
    const cobro=items.filter(i=>!i.entregado).reduce((s,i)=>s+(Number(i.precio)||0),0);
    $('cTotal').textContent=total; $('cPend').textContent=pend; $('cCobro').textContent=money(cobro);
    $('bar').style.width=(total?Math.round(done/total*100):0)+'%';
    $('progressTxt').textContent=total?(done+' de '+total+' entregadas'):'';
    $('summary').style.display=total?'flex':'none';

    if(!total){
      $('state').style.display='block';
      $('state').innerHTML='<i class="fas fa-box-open"></i><h2>Sin entregas todavía</h2><p>Aún no hay direcciones registradas en esta tanda.</p>';
      $('list').innerHTML=''; return;
    }
    $('state').style.display='none';
    $('list').innerHTML=items.map(it=>{
      const wa='https://wa.me/52'+esc(it.telefono);
      const partsMeta=[];
      if(it.contenido) partsMeta.push('<span><i class="fas fa-box"></i> '+esc(it.contenido)+'</span>');
      if(it.piezas>1) partsMeta.push('<span>'+it.piezas+' pzas</span>');
      const ref=[it.entreCalles?('Entre '+esc(it.entreCalles)):'', it.referencia?esc(it.referencia):''].filter(Boolean).join(' · ');
      return '<div class="card'+(it.entregado?' done':'')+'" data-id="'+it.id+'">'+
        '<div class="row1"><div><div class="who">'+esc(it.nombre)+'</div>'+
          '<div class="ped">'+esc(it.numeroPedido)+'</div></div>'+
          (it.precio?('<div class="precio">'+money(it.precio)+'</div>'):'')+'</div>'+
        '<div class="addr">'+esc(fullAddr(it))+'<br><span class="col">Col. '+esc(it.colonia)+'</span> · C.P. '+esc(it.cp)+'</div>'+
        (partsMeta.length?('<div class="meta">'+partsMeta.join('')+'</div>'):'')+
        (ref?('<div class="ref"><i class="fas fa-location-dot"></i> '+ref+'</div>'):'')+
        (it.comentarios?('<div class="comment"><i class="fas fa-circle-info"></i> '+esc(it.comentarios)+'</div>'):'')+
        '<div class="actions">'+
          '<a class="btn-map" href="'+mapsUrl(it)+'" target="_blank"><i class="fas fa-map-location-dot"></i> Mapa</a>'+
          '<a class="btn-wa" href="'+wa+'" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>'+
          '<a class="btn-call" href="tel:'+esc(it.telefono)+'"><i class="fas fa-phone"></i> Llamar</a>'+
          (it.entregado
            ? '<button class="btn-undone" data-act="toggle" data-val="0"><i class="fas fa-rotate-left"></i> Marcar pendiente</button>'
            : '<button class="btn-done" data-act="toggle" data-val="1"><i class="fas fa-check"></i> Marcar entregado</button>')+
        '</div></div>';
    }).join('');
  }

  $('list').addEventListener('click', async (e)=>{
    const b=e.target.closest('[data-act="toggle"]'); if(!b) return;
    const card=b.closest('.card'); const id=card.dataset.id; const val=b.dataset.val==='1';
    b.disabled=true; b.innerHTML='<i class="fas fa-spinner fa-spin"></i>';
    try{
      const r=await fetch(API+'/api/repartos-mty/tanda/'+fecha+'/entrega/'+id+'?token='+encodeURIComponent(token),
        {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({entregado:val})});
      const d=await r.json();
      if(d.success){ const it=items.find(i=>i.id===id); if(it) it.entregado=d.entregado; render(); }
      else { alert(d.message||'No se pudo actualizar.'); render(); }
    }catch(err){ alert('Error de conexión.'); render(); }
  });

  async function load(){
    if(!fecha || !token){ $('state').innerHTML='<i class="fas fa-link-slash"></i><h2>Enlace inválido</h2><p>Pide a Dekoor el enlace correcto de la tanda.</p>'; return; }
    $('fecha').textContent=fechaLarga(fecha);
    try{
      const r=await fetch(API+'/api/repartos-mty/tanda/'+fecha+'?token='+encodeURIComponent(token));
      const d=await r.json();
      if(d.success){ items=d.items||[]; render(); }
      else { $('state').innerHTML='<i class="fas fa-lock"></i><h2>'+esc(d.message||'Acceso denegado')+'</h2>'; }
    }catch(e){ $('state').innerHTML='<i class="fas fa-triangle-exclamation"></i><h2>Error al cargar</h2><p>Revisa tu conexión e intenta de nuevo.</p>'; }
  }
  load();
})();
</script>
</body>
</html>
